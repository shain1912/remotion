<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 105 — 표준 HTML 슬라이드 구조</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 64, height: '100%', alignItems: 'stretch' }}>
          {/* Left: title + code */}
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <Eyebrow>105 · STANDARD STRUCTURE</Eyebrow>
            <SlideTitle style={{ marginTop: 28 }}>
              16:9 <Hl italic={false}>div</Hl> + 마스터 스타일.
            </SlideTitle>
            <Body style={{ marginTop: 28, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 600 }}>
              모든 슬라이드는 1920×1080 한 장의 div. 마스터 CSS 한 파일이 디자인을 통일합니다.
            </Body>

            <div style={{ marginTop: 'auto' }}>
              <BentoCard bg={C.ink} fg={C.paper} padding={28}>
                <Eyebrow color={C.lime}>BOILERPLATE</Eyebrow>
                <div style={{ marginTop: 16, padding: 18, background: C.ink900, borderRadius: 12, fontFamily: FONT.mono, fontSize: 18, color: C.lime, lineHeight: 1.55, border: `1px solid ${C.fg2}`, whiteSpace: 'pre-wrap' }}>
{`<div class="slide" style="
  width: 1920px;
  height: 1080px;
  position: relative;
  overflow: hidden;
">
  <!-- header / main / footer -->
</div>`}
                </div>
              </BentoCard>
            </div>
          </div>

          {/* Right: 2x2 bento — 4 layers */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: '1fr 1fr', gap: 18 }}>
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>LAYER 01 · CANVAS</Eyebrow>
              <div style={{ marginTop: 16, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                1920 × 1080
              </div>
              <Body style={{ marginTop: 12, fontSize: 22 }}>
                절대 좌표 캔버스. 모든 슬라이드 동일 크기.
              </Body>
            </BentoCard>

            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>LAYER 02 · TOKENS</Eyebrow>
              <div style={{ marginTop: 16, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                CSS 변수
              </div>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.ink }}>
                색·폰트·간격을 토큰으로 한 번 정의 → 전 슬라이드 공유.
              </Body>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>LAYER 03 · COMPONENTS</Eyebrow>
              <div style={{ marginTop: 16, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em', color: C.paper }}>
                재사용 부품
              </div>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.fg4 }}>
                Title · Body · Card · Pill · Footer 같은 재사용 컴포넌트 묶음.
              </Body>
            </BentoCard>

            <BentoCard bg={C.lavSoft}>
              <Eyebrow color={C.ink}>LAYER 04 · CONTENT</Eyebrow>
              <div style={{ marginTop: 16, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                슬라이드 본문
              </div>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.ink }}>
                실제 텍스트·숫자·이미지. 디자인 결정은 위 3층에 위임.
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={105} total={TOTAL} label="M7 · PRESENTATION" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
