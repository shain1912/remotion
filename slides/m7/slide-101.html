<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 101 — 3단계 스토리라인 설계</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 64, height: '100%', alignItems: 'stretch' }}>
          {/* Left: title */}
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <Eyebrow>101 · STORYLINE PATTERNS</Eyebrow>
            <SlideTitle style={{ marginTop: 28 }}>
              구조는 <Hl italic={false}>4가지</Hl>면 충분하다.
            </SlideTitle>
            <Body style={{ marginTop: 32, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 600 }}>
              발표마다 새 구조 발명하지 마세요. 검증된 4가지 골격에서 청중·시간에 맞는 것을 골라 씁니다.
            </Body>

            <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 14 }}>
              <BentoCard bg={C.paper} accent="subtle" padding={24}>
                <Eyebrow color={C.fg3}>RULE OF THUMB</Eyebrow>
                <Body style={{ marginTop: 12, fontSize: 24 }}>
                  ① 짧으면 PREP · ② 설득은 SCQA · ③ 변화는 Before/After · ④ 학습은 5단계.
                </Body>
              </BentoCard>
            </div>
          </div>

          {/* Right: 2x2 bento — patterns */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: '1fr 1fr', gap: 18 }}>
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>PATTERN · PREP</Eyebrow>
              <div style={{ marginTop: 14, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                3분 압축
              </div>
              <Body style={{ marginTop: 12, fontSize: 22 }}>
                Point → Reason → Example → Point. 짧은 보고·발표 적합.
              </Body>
              <Pill color="ghost" style={{ marginTop: 16 }}>P · R · E · P</Pill>
            </BentoCard>

            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>PATTERN · SCQA</Eyebrow>
              <div style={{ marginTop: 14, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                설득의 정공법
              </div>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.ink }}>
                Situation → Complication → Question → Answer. 컨설팅 표준.
              </Body>
              <Pill color="ink" style={{ marginTop: 16 }}>S · C · Q · A</Pill>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>PATTERN · BEFORE/AFTER</Eyebrow>
              <div style={{ marginTop: 14, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em', color: C.paper }}>
                변화 보여주기
              </div>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.fg4 }}>
                As-Is → To-Be → Bridge. 조직·프로세스 개선 제안에 강함.
              </Body>
              <Pill color="lime" style={{ marginTop: 16 }}>AS-IS · TO-BE</Pill>
            </BentoCard>

            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>PATTERN · 5-STEP</Eyebrow>
              <div style={{ marginTop: 14, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                절차 학습
              </div>
              <Body style={{ marginTop: 12, fontSize: 22 }}>
                Why → What → How → Demo → Action. 워크숍·교육에 적합.
              </Body>
              <Pill color="ghost" style={{ marginTop: 16 }}>W · W · H · D · A</Pill>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={101} total={TOTAL} label="M7 · PRESENTATION" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
