<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 120 — 12시간 회고 + 다음 로드맵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  function KodeLogo({ height = 48, invert }) {
    return (
      <img
        src="../../handoff/assets/kode-korea-logo.png"
        alt="KODE KOREA"
        style={{ height, display: 'block', filter: invert ? 'invert(1)' : 'none' }}
      />
    );
  }

  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas} paddingX={112} paddingTop={80} paddingBottom={80}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          {/* Top row */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <KodeLogo height={48} />
            <Eyebrow color={C.fg3}>FINAL · COURSE WRAP</Eyebrow>
          </div>

          {/* Body */}
          <div style={{
            marginTop: 'auto', marginBottom: 'auto',
            display: 'grid', gridTemplateColumns: '1.4fr 1fr',
            gap: 56, alignItems: 'center'
          }}>
            {/* Left: Display copy */}
            <div>
              <div style={{
                fontFamily: FONT.display, fontWeight: 600,
                fontSize: 132, lineHeight: 0.92,
                letterSpacing: '-0.04em', color: C.ink, textWrap: 'balance'
              }}>
                12시간,<br/>
                <span style={{ position: 'relative', display: 'inline-block' }}>
                  <span style={{ position: 'absolute', inset: '-4px -10px', background: C.lime, zIndex: -1, borderRadius: 8 }} />
                  손에 남은
                </span><br/>
                3가지.
              </div>
              <div style={{
                marginTop: 36,
                fontFamily: FONT.sans, fontWeight: 500,
                fontSize: 32, lineHeight: 1.3, color: C.fg2, maxWidth: 720
              }}>
                슬라이드 120장은 끝났습니다. 진짜 자산은 여러분이 직접 만든 <b>산출물 3종</b>과, 내일도 쓸 <b>Skills · 템플릿 · 프롬프트</b>입니다.
              </div>

              <div style={{ marginTop: 36, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                <Pill color="ink">RESEARCH NOTE</Pill>
                <Pill color="ink">PROPOSAL PDF</Pill>
                <Pill color="ink">DECK PPTX</Pill>
              </div>
            </div>

            {/* Right: 산출물 + 로드맵 */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <BentoCard bg={C.lime} padding={24}>
                <Eyebrow color={C.ink}>OUTPUT 01 · DELIVERABLES</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontWeight: 600, fontSize: 30, lineHeight: 1.15, letterSpacing: '-0.02em' }}>
                  본인 작업물 3건
                </div>
                <Body style={{ marginTop: 8, fontSize: 22, color: C.ink }}>
                  자료조사 노트 + 제안서 PDF + 발표 PPTX 1건씩.
                </Body>
              </BentoCard>

              <BentoCard bg={C.ink} fg={C.paper} padding={24}>
                <Eyebrow color={C.lime}>OUTPUT 02 · ASSETS</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontWeight: 600, fontSize: 30, lineHeight: 1.15, letterSpacing: '-0.02em', color: C.paper }}>
                  Skills 4개 + 템플릿 2개
                </div>
                <Body style={{ marginTop: 8, fontSize: 22, color: C.fg4 }}>
                  Antigravity에 박제, 내일 다시 쓸 수 있는 자동화 자산.
                </Body>
              </BentoCard>

              <BentoCard bg={C.paper} accent="subtle" padding={24}>
                <Eyebrow color={C.fg3}>NEXT · ROADMAP</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontWeight: 600, fontSize: 30, lineHeight: 1.15, letterSpacing: '-0.02em' }}>
                  본인 직무 Skill 1개
                </div>
                <Body style={{ marginTop: 8, fontSize: 22 }}>
                  다음 7일 안에 본인 업무용 SKILL.md 1개를 직접 작성하세요.
                </Body>
              </BentoCard>
            </div>
          </div>

          {/* Footer */}
          <div style={{
            display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
            paddingTop: 24, borderTop: `1px solid ${C.ink}`
          }}>
            <Eyebrow>GEMINI × ANTIGRAVITY · 12-HOUR CURRICULUM · END</Eyebrow>
            <IndexMark index={120} total={TOTAL} color={C.ink} />
          </div>
        </div>
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
