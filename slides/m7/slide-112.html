<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 112 — Antigravity로 슬라이드 만들기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>112 · ANTIGRAVITY DEMO</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            Browser preview로 <Hl italic={false}>실시간</Hl> 다듬는다.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            HTML 슬라이드 한 장을 띄워놓고 색·간격·텍스트를 즉시 보면서 수정.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* INK */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>STEP 01 · OPEN</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.paper }}>
                슬라이드 HTML 열기
              </div>
              <Body style={{ marginTop: 14, fontSize: 22, color: C.fg4 }}>
                Antigravity에서 파일 열고 우측 Browser preview 켜기.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.ink900, borderRadius: 12, fontFamily: FONT.mono, fontSize: 22, color: C.lime, border: `1px solid ${C.lime}` }}>
                ⌘ ⇧ V
              </div>
            </BentoCard>

            {/* LIME */}
            <BentoCard bg={C.lime} fg={C.ink}>
              <Eyebrow color={C.ink}>STEP 02 · ITERATE</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                대화로 수정 요청
              </div>
              <Body style={{ marginTop: 14, fontSize: 22, color: C.ink }}>
                "오른쪽 카드 라임으로 바꿔줘" 한 줄 → 저장 → preview 새로고침.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.paper, borderRadius: 12, fontFamily: FONT.sans, fontSize: 22, fontWeight: 600 }}>
                "본문 한 줄 줄여줘"
              </div>
            </BentoCard>

            {/* PAPER */}
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>STEP 03 · CAPTURE</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                PNG로 박제
              </div>
              <Body style={{ marginTop: 14, fontSize: 22 }}>
                완성되면 캡처 스크립트 실행. PPTX 변환 단계로 넘김.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.mono, fontSize: 20, color: C.fg2, lineHeight: 1.5 }}>
                node capture.mjs<br/>
                slides/*.html
              </div>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={112} total={TOTAL} label="M7 · PRESENTATION" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
