<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 119 — 발표 리허설 프롬프트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>119 · REHEARSAL PROMPT</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            AI에게 <Hl italic={false}>청중 역할</Hl>을 시킨다.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            발표 전날, 모르는 청중을 만들어 Q&A 시뮬레이션. 가장 싼 리허설.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* INK */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>STEP 01 · ROLE</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.paper }}>
                청중 페르소나 부여
              </div>
              <Body style={{ marginTop: 14, fontSize: 22, color: C.fg4 }}>
                지위 · 사전지식 · 관심사 · 의심 포인트까지 디테일하게.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.ink900, borderRadius: 12, fontFamily: FONT.sans, fontSize: 22, fontWeight: 600, color: C.lime, border: `1px solid ${C.lime}`, lineHeight: 1.5 }}>
                "넌 보수적인<br/>50대 임원"
              </div>
            </BentoCard>

            {/* LIME hero */}
            <BentoCard bg={C.lime} fg={C.ink}>
              <Eyebrow color={C.ink}>STEP 02 · DECK INPUT</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                슬라이드 + 노트 첨부
              </div>
              <Body style={{ marginTop: 14, fontSize: 22, color: C.ink }}>
                PDF로 export 후 첨부. 발표자 노트까지 함께 전달.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.paper, borderRadius: 12, fontFamily: FONT.sans, fontSize: 22, fontWeight: 600 }}>
                deck.pdf · notes.md
              </div>
            </BentoCard>

            {/* PAPER */}
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>STEP 03 · ASK Q&A</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                날카로운 질문 5개
              </div>
              <Body style={{ marginTop: 14, fontSize: 22 }}>
                "예산 근거", "경쟁사 대비", "실패 시 책임" 등 약점 공격 요청.
              </Body>
              <div style={{ marginTop: 16, padding: '14px 18px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.sans, fontSize: 22, fontWeight: 600, color: C.fg2, lineHeight: 1.5 }}>
                "가장 의심스런<br/>지점 5개 질문해"
              </div>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={119} total={TOTAL} label="M7 · PRESENTATION" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
