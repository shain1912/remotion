<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 035 — M3 정리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas} paddingX={112} paddingTop={80} paddingBottom={80}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <Eyebrow>MODULE 03 · WRAP</Eyebrow>
            <Eyebrow color={C.fg3}>NEXT → M4 · HARNESS / SKILLS / MCP</Eyebrow>
          </div>

          <div style={{ marginTop: 'auto', marginBottom: 'auto', display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 56, alignItems: 'center' }}>
            <div>
              <div style={{ fontFamily: FONT.display, fontWeight: 600, fontSize: 132, lineHeight: 0.95, letterSpacing: '-0.04em', color: C.ink }}>
                이제 모델에<br/>
                <span style={{ position: 'relative', display: 'inline-block' }}>
                  <span style={{ position: 'absolute', inset: '-4px -10px', background: C.lime, zIndex: -1, borderRadius: 8 }} />
                  도구와 손
                </span><br/>
                을 달아줍니다.
              </div>
              <div style={{ marginTop: 36, fontFamily: FONT.sans, fontWeight: 500, fontSize: 32, lineHeight: 1.35, color: C.fg2, maxWidth: 720 }}>
                컨텍스트는 <b>모델이 보는 화면</b>이고, 다음 모듈 <b>하네스 / Skills / MCP</b>는 그 화면을 자동으로 채우고 행동까지 시키는 골격입니다.
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <BentoCard bg={C.paper} accent="subtle" padding={24}>
                <Eyebrow color={C.fg3}>TAKEAWAY 01</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontSize: 28, fontWeight: 600, color: C.ink, lineHeight: 1.15 }}>
                  컨텍스트는 5층 스택
                </div>
                <Body style={{ marginTop: 8, fontSize: 22 }}>
                  시스템·도구·메모리·RAG·사용자 입력을 같이 설계합니다.
                </Body>
              </BentoCard>

              <BentoCard bg={C.lime} padding={24}>
                <Eyebrow color={C.ink}>TAKEAWAY 02</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontSize: 28, fontWeight: 600, color: C.ink, lineHeight: 1.15 }}>
                  앞·뒤에 핵심을 배치
                </div>
                <Body style={{ marginTop: 8, fontSize: 22, color: C.ink }}>
                  Lost in the Middle을 피하고, 길이는 꼭 필요한 만큼만.
                </Body>
              </BentoCard>

              <BentoCard bg={C.ink} fg={C.paper} padding={24}>
                <Eyebrow color={C.lime}>TAKEAWAY 03</Eyebrow>
                <div style={{ marginTop: 8, fontFamily: FONT.display, fontSize: 28, fontWeight: 600, color: C.paper, lineHeight: 1.15 }}>
                  RAG · 캐싱 · 메모리
                </div>
                <Body style={{ marginTop: 8, fontSize: 22, color: C.fg4 }}>
                  근거는 RAG, 비용은 캐싱, 연속성은 메모리로 해결합니다.
                </Body>
              </BentoCard>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', paddingTop: 24, borderTop: `1px solid ${C.ink}` }}>
            <Eyebrow>M3 · CONTEXT ENGINEERING</Eyebrow>
            <IndexMark index={35} total={TOTAL} color={C.ink} />
          </div>
        </div>
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
