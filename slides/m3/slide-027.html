<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 027 — 컨텍스트 5대 구성요소</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  const ITEMS = [
    { kicker: '01 · SYSTEM',  title: '시스템 프롬프트', body: '역할·정책·말투·출력 형식.', bg: C.paper, fg: C.ink, accent: 'subtle', kickerColor: C.fg3 },
    { kicker: '02 · TOOLS',   title: '도구·함수',       body: '검색·코드 실행·파일 I/O.',  bg: C.lime,  fg: C.ink, accent: null,    kickerColor: C.ink },
    { kicker: '03 · MEMORY',  title: '메모리',           body: '단기 대화 + 장기 사용자 정보.', bg: C.paper, fg: C.ink, accent: 'subtle', kickerColor: C.fg3 },
    { kicker: '04 · RAG',     title: '검색 자료',         body: '회사 문서·웹 결과·DB.',      bg: C.ink,   fg: C.paper, accent: null,  kickerColor: C.lime },
    { kicker: '05 · USER',    title: '사용자 입력',       body: '지금 이 한 줄의 질문.',       bg: C.paper, fg: C.ink, accent: 'subtle', kickerColor: C.fg3 },
  ];

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>27 · CONTEXT STACK</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            컨텍스트는 <Hl italic={false}>5층 스택</Hl>으로 만든다.
          </SlideTitle>
          <Body style={{ marginTop: 24, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 1100 }}>
            모델에 들어가는 한 박스 안에는 사실 다섯 종류의 정보가 함께 흐릅니다. 어느 층이 비어 있는지부터 확인하세요.
          </Body>

          <div style={{
            marginTop: 64,
            display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 14,
            flex: 1, alignItems: 'stretch', position: 'relative'
          }}>
            {ITEMS.map((it, i) => (
              <div key={i} style={{ position: 'relative' }}>
                <BentoCard bg={it.bg} fg={it.fg} accent={it.accent} padding={28} style={{ height: '100%' }}>
                  <Eyebrow color={it.kickerColor}>{it.kicker}</Eyebrow>
                  <div style={{ marginTop: 20, fontFamily: FONT.display, fontSize: 38, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.025em' }}>
                    {it.title}
                  </div>
                  <Body style={{ marginTop: 16, fontSize: 24, color: it.fg === C.paper ? C.fg4 : C.fg2 }}>
                    {it.body}
                  </Body>
                </BentoCard>
                {i < ITEMS.length - 1 && (
                  <div style={{
                    position: 'absolute', right: -18, top: '50%', transform: 'translateY(-50%)',
                    fontFamily: FONT.mono, fontSize: 28, color: C.ink, zIndex: 3
                  }}>→</div>
                )}
              </div>
            ))}
          </div>
        </div>
        <SlideFooter index={27} total={TOTAL} label="M3 · CONTEXT ENGINEERING" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
