<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 054 — 6단계 비교·종합 표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    const rows = [
      { src: 'McKinsey 2025', stance: '도입 가속', perf: '+40%', risk: '환각 잔존', trust: 4 },
      { src: 'Gartner 리포트',  stance: '신중 도입', perf: '+22%', risk: '거버넌스 부재', trust: 4 },
      { src: 'arXiv 논문',     stance: '한계 강조', perf: '혼합', risk: '평가셋 편향', trust: 5 },
      { src: 'HN 커뮤니티',    stance: '낙관/회의 혼재', perf: '체감 ↑', risk: '재현성', trust: 3 },
    ];

    return (
      <SlideFrame bg={C.canvas} paddingX={0} paddingTop={0} paddingBottom={0}>
        <div style={{ display: 'grid', gridTemplateColumns: '420px 1fr', height: '100%' }}>
          <div style={{ background: C.lime, padding: 64, display: 'flex', flexDirection: 'column' }}>
            <Eyebrow color={C.ink}>STAGE 06</Eyebrow>
            <div style={{ marginTop: 32, fontFamily: FONT.display, fontWeight: 600, fontSize: 240, lineHeight: 0.85, letterSpacing: '-0.05em', color: C.ink }}>
              06
            </div>
            <div style={{ marginTop: 24, fontFamily: FONT.display, fontWeight: 600, fontSize: 44, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.ink }}>
              비교·종합<br/>매트릭스.
            </div>
            <div style={{ marginTop: 'auto', paddingTop: 24, borderTop: `1px solid ${C.ink}` }}>
              <Eyebrow color={C.ink}>EXIT CRITERIA</Eyebrow>
              <Body style={{ marginTop: 12, fontSize: 22, color: C.ink }}>
                한 페이지 표로 한눈에 비교 가능.
              </Body>
            </div>
          </div>

          <div style={{ padding: 80, display: 'flex', flexDirection: 'column' }}>
            <Eyebrow>54 · STAGE 06 · COMPARE</Eyebrow>
            <SlideTitle style={{ marginTop: 24 }}>
              출처별 주장을 <Hl italic={false}>한 표</Hl>로 정렬.
            </SlideTitle>
            <Body style={{ marginTop: 18, fontSize: 24, color: C.fg2, maxWidth: 980 }}>
              줄: 출처 / 칼럼: 같은 질문에 대한 답. 칸이 비면 추가 검색이 필요한 곳.
            </Body>

            <BentoCard bg={C.paper} accent="subtle" padding={28} style={{ marginTop: 32, flex: 1 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 0.8fr 1.2fr 0.6fr', gap: 0, fontFamily: FONT.mono, fontSize: 22 }}>
                {/* header */}
                {['SOURCE', 'STANCE', 'PERF', 'RISK', 'TRUST'].map((h) => (
                  <div key={h} style={{ padding: '14px 16px', borderBottom: `2px solid ${C.ink}`, color: C.ink, letterSpacing: '0.16em' }}>{h}</div>
                ))}
                {rows.map((r, i) => (
                  <React.Fragment key={i}>
                    <div style={{ padding: '18px 16px', borderBottom: `1px solid ${C.border}`, fontFamily: FONT.sans, fontSize: 24, fontWeight: 600 }}>{r.src}</div>
                    <div style={{ padding: '18px 16px', borderBottom: `1px solid ${C.border}`, fontFamily: FONT.sans, fontSize: 24, color: C.fg2 }}>{r.stance}</div>
                    <div style={{ padding: '18px 16px', borderBottom: `1px solid ${C.border}`, fontFamily: FONT.sans, fontSize: 24, fontWeight: 600, color: C.ink }}>{r.perf}</div>
                    <div style={{ padding: '18px 16px', borderBottom: `1px solid ${C.border}`, fontFamily: FONT.sans, fontSize: 24, color: C.fg2 }}>{r.risk}</div>
                    <div style={{ padding: '18px 16px', borderBottom: `1px solid ${C.border}` }}>
                      <span style={{ display: 'inline-block', padding: '6px 14px', borderRadius: 999, background: r.trust >= 4 ? C.lime : C.lavSoft, color: C.ink, fontFamily: FONT.mono, fontSize: 22, fontWeight: 600 }}>{r.trust}/5</span>
                    </div>
                  </React.Fragment>
                ))}
              </div>
              <div style={{ marginTop: 18, padding: '14px 18px', background: C.ink, borderRadius: 12, display: 'flex', alignItems: 'baseline', gap: 14 }}>
                <span style={{ fontFamily: FONT.mono, fontSize: 22, color: C.lime, letterSpacing: '0.16em' }}>INSIGHT ·</span>
                <span style={{ fontFamily: FONT.sans, fontSize: 24, color: C.paper }}>모두 도입 방향엔 동의. 위험 항목이 출처마다 다르므로 별도 정리 필요.</span>
              </div>
            </BentoCard>
          </div>
        </div>
        <div style={{ position: 'absolute', left: 420 + 80, right: 80, bottom: 32, display: 'flex', justifyContent: 'space-between', fontFamily: FONT.mono, fontSize: 22, color: C.fg3, letterSpacing: '0.16em', textTransform: 'uppercase' }}>
          <span style={{ color: C.ink }}>● HARNESS&nbsp;ENG · 2026</span>
          <span>M5 · RESEARCH AUTOMATION</span>
          <span style={{ color: C.ink }}>[54 / 120]</span>
        </div>
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
