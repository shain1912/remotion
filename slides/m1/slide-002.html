<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 002 — LLM이란?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>02 · WHAT IS AN LLM</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            LLM은 결국 <Hl italic={false}>다음 토큰 예측기</Hl>일 뿐.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            그 이상도, 그 이하도 아닙니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 64,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* INPUT */}
            <BentoCard bg={C.paper} fg={C.ink} accent="subtle">
              <Eyebrow color={C.fg3}>STEP 01 · INPUT</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 56, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.025em' }}>
                "오늘 점심으로 뭐 먹을까?"
              </div>
              <Body style={{ marginTop: 24, fontSize: 24 }}>
                사용자의 텍스트를 토큰 단위로 쪼개 모델에 입력합니다.
              </Body>
            </BentoCard>

            {/* PROCESS · LIME hero */}
            <BentoCard bg={C.lime} fg={C.ink}>
              <Eyebrow color={C.ink}>STEP 02 · PROCESS</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontWeight: 600, fontSize: 88, lineHeight: 1, letterSpacing: '-0.035em' }}>
                P(다음 토큰)
              </div>
              <div style={{ marginTop: 28, display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {[
                  { t: '"국밥"', p: '0.34', solid: true },
                  { t: '"파스타"', p: '0.21', solid: true },
                  { t: '"김밥"', p: '0.11', solid: false },
                  { t: '…',     p: '',     solid: false },
                ].map((x, i) => (
                  <span key={i} style={{
                    display: 'inline-flex', alignItems: 'baseline', gap: 8,
                    padding: '12px 22px', borderRadius: 999,
                    background: x.solid ? C.ink : 'transparent',
                    color: x.solid ? C.paper : C.ink,
                    border: x.solid ? '1.5px solid transparent' : `1.5px solid ${C.ink}`,
                  }}>
                    <span style={{ fontFamily: FONT.sans, fontSize: 24, fontWeight: 600 }}>{x.t}</span>
                    {x.p && <span style={{ fontFamily: FONT.mono, fontSize: 22, letterSpacing: '0.04em' }}>{x.p}</span>}
                  </span>
                ))}
              </div>
              <Body style={{ marginTop: 24, fontSize: 24, color: C.ink }}>
                각 후보 토큰의 확률을 계산해 가장 그럴듯한 것을 고릅니다.
              </Body>
            </BentoCard>

            {/* OUTPUT */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>STEP 03 · OUTPUT</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 56, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.025em', color: C.paper }}>
                "오늘은 따뜻한 <span style={{ color: C.lime }}>국밥</span>이 좋겠어요."
              </div>
              <Body style={{ marginTop: 24, fontSize: 24, color: C.fg4 }}>
                이 한 토큰 선택을 수백 번 반복하면 한 문장이 됩니다.
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={2} total={TOTAL} label="M1 · AI/LLM CORE" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
