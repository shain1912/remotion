<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 005 — Gemini vs Claude vs GPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>05 · ECOSYSTEM</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            Gemini · Claude · GPT — <Hl italic={false}>강점만 한 줄</Hl>씩.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            "어느 게 최고냐"가 아니라 "어디에 강한가".
          </SlideSubtitle>

          <div style={{
            marginTop: 64,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* Claude */}
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>ANTHROPIC</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 80, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.04em' }}>
                Claude
              </div>
              <Body style={{ marginTop: 24, fontSize: 26 }}>
                긴 글의 <b>일관성</b> · 코드 추론 · 안전한 톤. 문서·법률·연구에 강함.
              </Body>
              <Pill color="ghost" style={{ marginTop: 28 }}>200K CTX</Pill>
            </BentoCard>

            {/* Gemini · LIME hero (우리 과정 주인공) */}
            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>GOOGLE</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 80, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.04em' }}>
                Gemini
              </div>
              <Body style={{ marginTop: 24, fontSize: 26, color: C.ink }}>
                <b>2M 토큰 컨텍스트</b> · 멀티모달(이미지·영상·오디오) 통합 · Google 생태계 연동.
              </Body>
              <Pill color="ink" style={{ marginTop: 28 }}>2M CTX · MULTIMODAL</Pill>
            </BentoCard>

            {/* GPT */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>OPENAI</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 80, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.04em', color: C.paper }}>
                GPT
              </div>
              <Body style={{ marginTop: 24, fontSize: 26, color: C.fg4 }}>
                가장 넓은 <b>도구·플러그인 생태계</b>. 이미지 생성·음성 등 멀티 모달 제품 성숙.
              </Body>
              <Pill color="lime" style={{ marginTop: 28 }}>ECOSYSTEM</Pill>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={5} total={TOTAL} label="M1 · AI/LLM CORE" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
