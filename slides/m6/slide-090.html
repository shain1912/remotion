<!DOCTYPE html>
<html lang="ko">
<head>

  <title>Slide 090 — 실습 섹션 초안 작성</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas} paddingX={0} paddingTop={0} paddingBottom={0}>
        <div style={{ display: 'grid', gridTemplateColumns: '420px 1fr', height: '100%' }}>
          <div style={{ background: C.lime, padding: 64, display: 'flex', flexDirection: 'column' }}>
            <Eyebrow color={C.ink}>HANDS-ON · 03</Eyebrow>
            <div style={{ marginTop: 32, fontFamily: FONT.display, fontWeight: 600, fontSize: 240, lineHeight: 0.85, letterSpacing: '-0.05em', color: C.ink }}>

            </div>
            <div style={{ marginTop: 24, fontFamily: FONT.display, fontWeight: 600, fontSize: 44, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.ink }}>
              Draft<br/>3 Sections.
            </div>
            <div style={{ marginTop: 'auto', paddingTop: 24, borderTop: `1px solid ${C.ink}` }}>
              <Eyebrow color={C.ink}>EXIT CRITERIA</Eyebrow>

                <Body style={{ marginTop: 14, fontSize: 24 }}>
                  배점·심사 비중이 높은 3개 섹션만 골라 집중. 나머지는 후순위.

                <div style={{ marginTop: 16, padding: '14px 18px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.mono, fontSize: 22 }}>

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
