<!DOCTYPE html>
<html lang="ko">
<head>

  <title>Slide 083 — 표준 HTML 제안서 템플릿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<body>
<div id="stage"></div>

<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 64, height: '100%', alignItems: 'stretch' }}>
          {/* Left: title + lead */}
          <div style={{ display: 'flex', flexDirection: 'column' }}>

            <SlideTitle style={{ marginTop: 28 }}>

            <Body style={{ marginTop: 32, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 520 }}>

            <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 14 }}>

              </BentoCard>
            </div>

            <BentoCard bg={C.paper} accent="subtle" padding={28}>
              <Eyebrow color={C.fg3}>BLOCK 01</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                Cover
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.fg2 }}>
                제목·발주처·제출일·대표 비주얼 1장.
              </Body>
            </BentoCard>

            <BentoCard bg={C.lime} padding={28}>
              <Eyebrow color={C.ink}>BLOCK 02</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>

              <Body style={{ marginTop: 10, fontSize: 22, color: C.ink }}>

            </BentoCard>

            <BentoCard bg={C.paper} accent="subtle" padding={28}>
              <Eyebrow color={C.fg3}>BLOCK 03</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>

              <Body style={{ marginTop: 10, fontSize: 22, color: C.fg2 }}>

            <BentoCard bg={C.ink} fg={C.paper} padding={28}>

              <Body style={{ marginTop: 10, fontSize: 22, color: C.ink }}>

              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={83} total={TOTAL} label="M6 · PROPOSAL" />

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
