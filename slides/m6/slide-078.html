<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 078 — 핵심 메시지 일관성</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 64, height: '100%', alignItems: 'stretch' }}>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <Eyebrow>78 · STEP 04 · ONE-LINE SUMMARY</Eyebrow>
            <SlideTitle style={{ marginTop: 28 }}>
              제안서 전체를 <Hl italic={false}>한 줄</Hl>로 압축해 두라.
            </SlideTitle>
            <Body style={{ marginTop: 32, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 540 }}>
              모든 섹션 초안을 쓰기 전, 발주처가 이 제안서를 한 문장으로 기억할 카피를 먼저 박아둡니다. 이후 모든 챕터는 이 한 줄을 증명하는 챕터.
            </Body>
            <BentoCard bg={C.lime} padding={28} style={{ marginTop: 'auto' }}>
              <Eyebrow color={C.ink}>FORMULA</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 32, fontWeight: 600, lineHeight: 1.2, letterSpacing: '-0.02em', color: C.ink }}>
                [고객 문제] 을(를) [우리 방식] 으로 [측정가능한 결과] 까지.
              </div>
            </BentoCard>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            <BentoCard bg={C.paper} accent="ink" padding={36}>
              <Eyebrow color={C.fg3}>EXAMPLE · ONE-LINER</Eyebrow>
              <div style={{ marginTop: 18, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.15, letterSpacing: '-0.025em' }}>
                "흩어진 사내 매뉴얼을 <span style={{ background: C.lime, padding: '0 8px' }}>AI 검색</span>으로 <span style={{ background: C.lime, padding: '0 8px' }}>응답시간 80% 단축</span>까지."
              </div>
            </BentoCard>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14, flex: 1 }}>
              <BentoCard bg={C.paper} accent="subtle" padding={24}>
                <Eyebrow color={C.fg3}>CHECK 01</Eyebrow>
                <Body style={{ marginTop: 12, fontSize: 22 }}>
                  요약 페이지 첫 줄에 그대로 노출되는가?
                </Body>
              </BentoCard>
              <BentoCard bg={C.paper} accent="subtle" padding={24}>
                <Eyebrow color={C.fg3}>CHECK 02</Eyebrow>
                <Body style={{ marginTop: 12, fontSize: 22 }}>
                  각 챕터 도입부 한 문장이 이 한 줄을 받쳐주는가?
                </Body>
              </BentoCard>
              <BentoCard bg={C.ink} fg={C.paper} padding={24}>
                <Eyebrow color={C.lime}>CHECK 03</Eyebrow>
                <Body style={{ marginTop: 12, fontSize: 22, color: C.fg4 }}>
                  마지막 슬라이드 / 견적 페이지에서도 같은 카피로 닫히는가?
                </Body>
              </BentoCard>
            </div>

            <BentoCard bg={C.lavSoft} padding={24}>
              <Eyebrow color={C.ink}>ANTI-PATTERN</Eyebrow>
              <Body style={{ marginTop: 10, fontSize: 24, color: C.ink }}>
                섹션마다 다른 말로 같은 걸 설명하는 순간, 평가위원은 흐름을 잃는다.
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={78} total={TOTAL} label="M6 · PROPOSAL" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
