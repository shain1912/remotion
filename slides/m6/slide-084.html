<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 084 — 디자인 토큰 사용법</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>84 · DESIGN TOKENS</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            색·간격·타이포는 <Hl italic={false}>한 곳</Hl>에서만 바꿉니다.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            tokens.css 한 파일이 디자인 전체를 통제합니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            <BentoCard bg={C.paper} accent="subtle" padding={36}>
              <Eyebrow color={C.fg3}>COLOR</Eyebrow>
              <div style={{ marginTop: 20, fontFamily: FONT.display, fontSize: 48, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                4개 토큰
              </div>
              <Body style={{ marginTop: 18, fontSize: 22, color: C.fg2 }}>
                primary · ink · canvas · accent — 이 4개로 90% 커버.
              </Body>
              <div style={{ marginTop: 18, display: 'flex', gap: 8 }}>
                <span style={{ width: 36, height: 36, background: C.lime, borderRadius: 8 }}></span>
                <span style={{ width: 36, height: 36, background: C.ink, borderRadius: 8 }}></span>
                <span style={{ width: 36, height: 36, background: C.canvas, borderRadius: 8, border: `1px solid ${C.border}` }}></span>
                <span style={{ width: 36, height: 36, background: C.lav, borderRadius: 8 }}></span>
              </div>
            </BentoCard>

            <BentoCard bg={C.lime} padding={36}>
              <Eyebrow color={C.ink}>SPACING</Eyebrow>
              <div style={{ marginTop: 20, fontFamily: FONT.display, fontSize: 48, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em' }}>
                8px 그리드
              </div>
              <Body style={{ marginTop: 18, fontSize: 22, color: C.ink }}>
                여백은 8의 배수만 — 8·16·24·32·48·64. 정렬이 자동으로 잡힙니다.
              </Body>
              <div style={{ marginTop: 18, display: 'flex', gap: 6, alignItems: 'flex-end' }}>
                {[8, 16, 24, 32, 48].map((n, i) => (
                  <div key={i} style={{ width: 32, height: n, background: C.ink, borderRadius: 4 }}></div>
                ))}
              </div>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper} padding={36}>
              <Eyebrow color={C.lime}>TYPOGRAPHY</Eyebrow>
              <div style={{ marginTop: 20, fontFamily: FONT.display, fontSize: 48, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.03em', color: C.paper }}>
                4단 위계
              </div>
              <Body style={{ marginTop: 18, fontSize: 22, color: C.fg4 }}>
                title · subtitle · body · caption. 그 외 크기는 만들지 않습니다.
              </Body>
              <div style={{ marginTop: 14, padding: '14px 18px', background: C.ink900, borderRadius: 12, fontFamily: FONT.mono, fontSize: 22, color: C.lime, border: `1px solid ${C.lime}` }}>
                --size-title: 44px
              </div>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={84} total={TOTAL} label="M6 · PROPOSAL" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
