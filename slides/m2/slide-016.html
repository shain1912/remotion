<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 016 — Chain-of-Thought</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>16 · CHAIN OF THOUGHT</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            "<Hl italic={false}>단계별로 생각해보자.</Hl>"
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            한 줄을 끼워 넣으면 추론 정확도가 눈에 띄게 올라갑니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>BEFORE</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.sans, fontSize: 26, fontWeight: 600, lineHeight: 1.3, color: C.ink }}>
                "정답만 한 단어로."
              </div>
              <Body style={{ marginTop: 24, fontSize: 24 }}>
                모델이 <b>곧장 추측</b>합니다. 다단 추론에서는 자주 틀립니다.
              </Body>
              <Pill color="ghost" style={{ marginTop: 24 }}>ACC · BASELINE</Pill>
            </BentoCard>

            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>WITH CoT</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.paper, borderRadius: 12, fontFamily: FONT.sans, fontSize: 24, fontWeight: 500, lineHeight: 1.4, color: C.ink }}>
                "단계별로 생각하고, 각 단계의 근거를 적은 뒤 마지막에 결론."
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.ink }}>
                <b>중간 사고</b>를 쓰게 만들면 자가 점검이 일어납니다.
              </Body>
              <Pill color="ink" style={{ marginTop: 20 }}>ACC · +20~40%</Pill>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>WHEN TO USE</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.15, letterSpacing: '-0.02em', color: C.paper }}>
                수학 · 논리<br/>비교 · 인과
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.fg4 }}>
                단순 분류·번역에는 불필요. <b>다단 추론</b>에서만 쓰세요.
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={16} total={TOTAL} label="M2 · PROMPT ENGINEERING" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
