<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 011 — 프롬프트의 5요소</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 64, height: '100%', alignItems: 'stretch' }}>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <Eyebrow>11 · PROMPT ANATOMY</Eyebrow>
            <SlideTitle style={{ marginTop: 28 }}>
              좋은 프롬프트는 <Hl italic={false}>5요소</Hl>로 이뤄집니다.
            </SlideTitle>
            <Body style={{ marginTop: 32, fontSize: TYPE_SCALE.lead, color: C.fg2, maxWidth: 540 }}>
              감으로 쓰지 마세요. <b>역할 · 과업 · 맥락 · 제약 · 출력형식</b> 다섯 슬롯을 채우면 결과가 안정됩니다.
            </Body>

            <BentoCard bg={C.ink} fg={C.paper} padding={28} style={{ marginTop: 'auto' }}>
              <Eyebrow color={C.lime}>RULE OF THUMB</Eyebrow>
              <Body style={{ marginTop: 12, fontSize: 24, color: C.fg4 }}>
                다섯 슬롯 중 하나라도 비면 모델이 추측합니다. 추측은 <b style={{ color: C.lime }}>오답의 시작</b>입니다.
              </Body>
            </BentoCard>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: '1fr 1fr 1fr', gap: 14 }}>
            <BentoCard bg={C.paper} accent="subtle" padding={28}>
              <Eyebrow color={C.fg3}>01 · ROLE</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                역할
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.fg2 }}>
                "너는 시니어 카피라이터다"
              </Body>
            </BentoCard>

            <BentoCard bg={C.lime} padding={28}>
              <Eyebrow color={C.ink}>02 · TASK</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                과업
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.ink }}>
                "랜딩 헤드라인 5개 작성"
              </Body>
            </BentoCard>

            <BentoCard bg={C.paper} accent="subtle" padding={28}>
              <Eyebrow color={C.fg3}>03 · CONTEXT</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                맥락
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.fg2 }}>
                대상 · 톤 · 브랜드 · 자료
              </Body>
            </BentoCard>

            <BentoCard bg={C.lavSoft} padding={28}>
              <Eyebrow color={C.ink}>04 · CONSTRAINT</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em' }}>
                제약
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.ink }}>
                30자 이내 · 영문 금지
              </Body>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper} padding={28} style={{ gridColumn: '1 / 3' }}>
              <Eyebrow color={C.lime}>05 · FORMAT</Eyebrow>
              <div style={{ marginTop: 12, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.paper }}>
                출력 형식 — 표 / JSON / 마크다운
              </div>
              <Body style={{ marginTop: 10, fontSize: 22, color: C.fg4 }}>
                "헤드라인 · 톤 · 한 줄 근거 3컬럼 표로 출력"
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={11} total={TOTAL} label="M2 · PROMPT ENGINEERING" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
