<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 012 — 명확성 Before/After</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>12 · CLARITY</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            모호한 한 줄 vs <Hl italic={false}>구체적인 한 단락</Hl>.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            같은 요청, 다른 결과. 차이는 단어 수가 아니라 <b>슬롯의 충실도</b>입니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>BEFORE · 모호</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.sans, fontSize: 28, fontWeight: 600, lineHeight: 1.3, color: C.ink }}>
                "회의록 좀 정리해줘."
              </div>
              <Body style={{ marginTop: 24, fontSize: 24 }}>
                대상·길이·형식·톤 모두 모름. 모델은 <b>가장 흔한 형태</b>로 추측해 답합니다.
              </Body>
              <Pill color="ghost" style={{ marginTop: 24 }}>RESULT · GENERIC</Pill>
            </BentoCard>

            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>AFTER · 구체</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.paper, borderRadius: 12, fontFamily: FONT.sans, fontSize: 24, fontWeight: 500, lineHeight: 1.4, color: C.ink }}>
                "팀장 보고용으로 결정사항 5개 · 액션아이템 표(담당/기한)로. 본문은 한국어, 200자 이내 요약 먼저."
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.ink }}>
                <b>대상 · 출력 · 분량 · 우선순위</b>를 모두 명시했습니다.
              </Body>
              <Pill color="ink" style={{ marginTop: 20 }}>RESULT · USABLE</Pill>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>SO WHAT</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 80, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.04em', color: C.lime }}>
                3×
              </div>
              <div style={{ marginTop: 8, fontFamily: FONT.display, fontSize: 28, fontWeight: 600, color: C.paper, lineHeight: 1.2 }}>
                재작업 횟수 감소
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.fg4 }}>
                구체적 한 단락이 모호한 다섯 번의 재요청을 막습니다. 시간 · 토큰 · 짜증 모두 절약.
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={12} total={TOTAL} label="M2 · PROMPT ENGINEERING" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
