<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 019 — 부정형 함정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>19 · POSITIVE FRAMING</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            "<Hl italic={false}>~하지 마</Hl>"보다 "<Hl italic={false}>~해</Hl>".
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            모델은 부정문을 자주 흘려듣습니다. 원하는 행동을 직접 시키는 게 안전합니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 56,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>BAD · 부정형</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.canvasAlt, borderRadius: 12, fontFamily: FONT.sans, fontSize: 26, fontWeight: 600, lineHeight: 1.3, color: C.ink }}>
                "장황하게 쓰지 마."
              </div>
              <Body style={{ marginTop: 24, fontSize: 24 }}>
                기준이 모호합니다. <b>장황의 정의</b>를 모델이 자기 식으로 해석합니다.
              </Body>
            </BentoCard>

            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>GOOD · 긍정 + 측정</Eyebrow>
              <div style={{ marginTop: 24, padding: '18px 22px', background: C.paper, borderRadius: 12, fontFamily: FONT.sans, fontSize: 26, fontWeight: 600, lineHeight: 1.3, color: C.ink }}>
                "한 문단 3문장 이내."
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.ink }}>
                <b>측정 가능한 양</b>으로 바꾸면 결과가 통제됩니다.
              </Body>
            </BentoCard>

            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>RECIPE</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 36, fontWeight: 600, lineHeight: 1.15, letterSpacing: '-0.02em', color: C.paper }}>
                금지 → 행동 +<br/>측정 단위로 치환
              </div>
              <Body style={{ marginTop: 20, fontSize: 22, color: C.fg4 }}>
                "이모지 금지" → <b>"한국어 텍스트만 출력"</b><br/>
                "복잡하게 X" → <b>"중학생도 이해할 단어"</b>
              </Body>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={19} total={TOTAL} label="M2 · PROMPT ENGINEERING" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
