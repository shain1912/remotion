<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 038 — Tool Use / Function Calling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>38 · TOOL USE</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            모델이 <Hl italic={false}>외부 도구</Hl>를 호출하는 법.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            "모르면 검색", "필요하면 계산기" — 모델이 직접 결정합니다.
          </SlideSubtitle>

          <div style={{
            marginTop: 64,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* Step 1: Request */}
            <BentoCard bg={C.paper} fg={C.ink} accent="subtle">
              <Eyebrow color={C.fg3}>STEP 01 · REQUEST</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.025em' }}>
                "오늘 서울 날씨 알려줘"
              </div>
              <Body style={{ marginTop: 24, fontSize: 24 }}>
                사용자 질문이 들어옵니다. 모델은 학습 데이터에 오늘 날씨가 없음을 인지합니다.
              </Body>
              <Pill color="ghost" style={{ marginTop: 28 }}>USER INPUT</Pill>
            </BentoCard>

            {/* Step 2: Tool Call · LIME hero */}
            <BentoCard bg={C.lime} fg={C.ink}>
              <Eyebrow color={C.ink}>STEP 02 · TOOL CALL</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.mono, fontSize: 28, fontWeight: 600, lineHeight: 1.3, letterSpacing: '-0.01em' }}>
                get_weather(<br/>
                &nbsp;&nbsp;city: "Seoul"<br/>
                )
              </div>
              <Body style={{ marginTop: 24, fontSize: 24, color: C.ink }}>
                모델이 JSON으로 함수와 인자를 출력합니다. 하네스가 실제로 API를 호출합니다.
              </Body>
              <Pill color="ink" style={{ marginTop: 28 }}>FUNCTION CALL</Pill>
            </BentoCard>

            {/* Step 3: Response */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>STEP 03 · RESPONSE</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 40, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.025em', color: C.paper }}>
                "서울은 지금 <span style={{ color: C.lime }}>14°C</span>, 맑음입니다."
              </div>
              <Body style={{ marginTop: 24, fontSize: 24, color: C.fg4 }}>
                도구 결과를 받아 자연어로 다시 정리해 답합니다. 모델은 사실 도구의 사용자입니다.
              </Body>
              <Pill color="lime" style={{ marginTop: 28 }}>FINAL ANSWER</Pill>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={38} total={TOTAL} label="M4 · HARNESS · SKILLS · MCP" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
