<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Slide 041 — MCP란?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" />
  <link rel="stylesheet" href="../../handoff/design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #E6E7EB; }
    #stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #E6E7EB; color: #0A0A0A; }
    em { font-style: italic; }
  </style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../../handoff/slide-tokens.jsx"></script>
<script type="text/babel" src="../../handoff/slide-primitives.jsx"></script>

<script type="text/babel">
  const TOTAL = 120;

  function Slide() {
    return (
      <SlideFrame bg={C.canvas}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Eyebrow>41 · MCP · USB-C FOR AI</Eyebrow>
          <SlideTitle style={{ marginTop: 28 }}>
            M × N을 <Hl italic={false}>M + N</Hl>으로.
          </SlideTitle>
          <SlideSubtitle style={{ marginTop: 16, color: C.fg2 }}>
            모든 AI ↔ 모든 도구 연결을 단 하나의 표준 케이블로.
          </SlideSubtitle>

          <div style={{
            marginTop: 64,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24,
            flex: 1, alignItems: 'stretch'
          }}>
            {/* Before */}
            <BentoCard bg={C.paper} accent="subtle">
              <Eyebrow color={C.fg3}>BEFORE</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 88, fontWeight: 600, lineHeight: 0.95, letterSpacing: '-0.05em' }}>
                M × N
              </div>
              <Body style={{ marginTop: 20, fontSize: 24 }}>
                AI 모델 5개 × 도구 100개 = 500개의 커스텀 어댑터. 모두가 모두에게 따로 연결.
              </Body>
              <Pill color="ghost" style={{ marginTop: 24 }}>500 ADAPTERS</Pill>
            </BentoCard>

            {/* MCP · LIME hero */}
            <BentoCard bg={C.lime}>
              <Eyebrow color={C.ink}>MCP STANDARD</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 88, fontWeight: 600, lineHeight: 0.95, letterSpacing: '-0.05em' }}>
                M + N
              </div>
              <Body style={{ marginTop: 20, fontSize: 24, color: C.ink }}>
                <b>Model Context Protocol</b> — Anthropic이 제안한 공통 규약. 한 번 만들면 모든 AI가 사용.
              </Body>
              <Pill color="ink" style={{ marginTop: 24 }}>105 CONNECTORS</Pill>
            </BentoCard>

            {/* So What */}
            <BentoCard bg={C.ink} fg={C.paper}>
              <Eyebrow color={C.lime}>SO WHAT</Eyebrow>
              <div style={{ marginTop: 24, fontFamily: FONT.display, fontSize: 44, fontWeight: 600, lineHeight: 1.05, letterSpacing: '-0.025em', color: C.paper }}>
                AI가 회사 시스템에<br/>그대로 꽂힌다.
              </div>
              <Body style={{ marginTop: 20, fontSize: 24, color: C.fg4 }}>
                Notion · GitHub · Drive · DB가 한 줄 설정으로 Antigravity에 붙습니다.
              </Body>
              <Pill color="lime" style={{ marginTop: 24 }}>PLUG &amp; PLAY</Pill>
            </BentoCard>
          </div>
        </div>
        <SlideFooter index={41} total={TOTAL} label="M4 · HARNESS · SKILLS · MCP" />
      </SlideFrame>
    );
  }

  ReactDOM.createRoot(document.getElementById('stage')).render(<Slide />);
</script>
</body>
</html>
